<script>
	let deferredPrompt;
	const addBtn = document.getElementById('install-button');
	window.addEventListener('beforeinstallprompt', (e) => {
		e.preventDefault();
		deferredPrompt = e;
    document.getElementById('installMsg').classList.remove("w3-hide");
		addBtn.addEventListener('click', (e) => {
      document.getElementById('installMsg').classList.add("w3-hide");
			deferredPrompt.prompt();
			deferredPrompt.userChoice.then((choiceResult) => {
				deferredPrompt = null;
			});
		});
	});
</script>
